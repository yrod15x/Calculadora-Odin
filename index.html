<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylos.css">
    <title>Calculadora</title>
</head>
<body>
    <main>
        <div class="calculadora">
            <p class="resultado">0</p>
            <div class="teclas">
                <div class="digitos">
                <button name="1" value="1">1</button>
                <button name="2" value="2">2</button>
                <button name="3" value="3">3</button>
                <button name="4" value="4">4</button>
                <button name="5" value="5">5</button>
                <button name="6" value="6">6</button>
                <button name="7" value="7">7</button>
                <button name="8" value="8">8</button>
                <button name="9" value="9">9</button>
                <button name="0" value="0">0</button>
                <button name="=" value="=" class="igual">=</button>
            </div>
            <div class="simbolos">
                <button name="+" value="+" class="mas operacion">+</button>
                <button name="-" value="-" class="menos operacion">-</button>
                <button name="*" value="*" class="producto operacion">*</button>
                <button name="/" value="/" class="division operacion">/</button>
            </div>
            </div>
        </div>
    </main>
    <script src="calculadora.js"></script>
</body>
</html>
